<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-label="AutoWave connects WhatsApp to your calendar">
  <defs>
    <linearGradient id="gTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E896"/>
      <stop offset="100%" stop-color="#00D084"/>
    </linearGradient>
    <linearGradient id="gSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#008f5a"/>
      <stop offset="100%" stop-color="#006b44"/>
    </linearGradient>
    <linearGradient id="gFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D084"/>
      <stop offset="100%" stop-color="#00a86b"/>
    </linearGradient>
    <linearGradient id="wa" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25D366"/>
      <stop offset="100%" stop-color="#128C7E"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563FF"/>
    </linearGradient>
    <linearGradient id="plat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="sh" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset in="blur" dx="0" dy="14" result="offsetBlur"/>
      <feFlood flood-color="#0B1F44" flood-opacity="0.14" result="flood"/>
      <feComposite in="flood" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shSoft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset in="blur" dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#2563FF" flood-opacity="0.1" result="flood"/>
      <feComposite in="flood" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#00D084"/>
    </marker>
  </defs>

  <rect width="720" height="520" rx="24" fill="#F8FAFD"/>
  <ellipse cx="360" cy="448" rx="300" ry="52" fill="#E6ECF5"/>

  <g transform="translate(80,360)">
    <path fill="#CBD5E1" fill-opacity="0.5" d="M0,60 L280,20 L560,60 L280,100 Z"/>
    <path fill="url(#plat)" d="M0,20 L280,-20 L560,20 L280,60 Z"/>
  </g>

  <g filter="url(#sh)" transform="translate(48,228)">
    <path fill="#F1F5F9" d="M0,48 L72,18 L72,108 L0,138 Z"/>
    <path fill="#E2E8F0" d="M72,18 L144,48 L144,138 L72,108 Z"/>
    <path fill="#ffffff" d="M0,48 L72,18 L144,48 L72,78 Z"/>
    <rect x="36" y="52" width="52" height="34" rx="6" fill="url(#wa)"/>
    <path d="M48,62 h28 M48,72 h20" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <text x="72" y="122" text-anchor="middle" fill="#0B1F44" font-size="12" font-family="Inter,system-ui,sans-serif">Customer</text>
    <text x="72" y="136" text-anchor="middle" fill="#5C6A82" font-size="9" font-family="Inter,system-ui,sans-serif">WhatsApp chat</text>
  </g>

  <g filter="url(#shSoft)" transform="translate(248,120)">
    <path fill="url(#gSide)" d="M0,60 L100,20 L100,160 L0,200 Z"/>
    <path fill="url(#gFront)" d="M100,20 L200,60 L200,200 L100,160 Z"/>
    <path fill="url(#gTop)" d="M0,60 L100,20 L200,60 L100,100 Z"/>
    <text x="100" y="88" text-anchor="middle" fill="#ffffff" font-size="16" font-family="Inter,system-ui,sans-serif">AutoWave</text>
    <text x="100" y="108" text-anchor="middle" fill="#ecfdf5" font-size="10" font-family="Inter,system-ui,sans-serif">Rules, slots, alerts</text>
    <rect x="40" y="118" width="120" height="8" rx="4" fill="#ffffff" fill-opacity="0.25"/>
    <rect x="40" y="132" width="88" height="6" rx="3" fill="#ffffff" fill-opacity="0.15"/>
  </g>

  <g filter="url(#sh)" transform="translate(420,248)">
    <path fill="#DBEAFE" d="M0,42 L68,12 L68,102 L0,132 Z"/>
    <path fill="#93C5FD" d="M68,12 L136,42 L136,132 L68,102 Z"/>
    <path fill="#EFF6FF" d="M0,42 L68,12 L136,42 L68,72 Z"/>
    <rect x="46" y="46" width="44" height="32" rx="5" fill="url(#blue)"/>
    <rect x="52" y="54" width="32" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.95"/>
    <rect x="52" y="64" width="24" height="4" rx="2" fill="#ffffff" fill-opacity="0.65"/>
    <rect x="52" y="72" width="28" height="4" rx="2" fill="#ffffff" fill-opacity="0.45"/>
    <text x="68" y="118" text-anchor="middle" fill="#0B1F44" font-size="11" font-family="Inter,system-ui,sans-serif">Your calendar</text>
  </g>

  <g filter="url(#sh)" transform="translate(528,168)">
    <path fill="#F8FAFD" d="M0,44 L58,16 L58,96 L0,124 Z"/>
    <path fill="#E6ECF5" d="M58,16 L116,44 L116,124 L58,96 Z"/>
    <path fill="#ffffff" d="M0,44 L58,16 L116,44 L58,72 Z"/>
    <circle cx="58" cy="50" r="18" fill="#00D084"/>
    <path d="M50,50 L56,56 L68,44" stroke="#ffffff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="58" y="108" text-anchor="middle" fill="#0B1F44" font-size="11" font-family="Inter,system-ui,sans-serif">You approve</text>
  </g>

  <path d="M192,290 L248,260" stroke="#5C6A82" stroke-width="2" stroke-dasharray="7,5" fill="none" opacity="0.45"/>
  <path d="M448,260 L420,290" stroke="#5C6A82" stroke-width="2" stroke-dasharray="7,5" fill="none" opacity="0.45"/>
  <path d="M348,220 L348,180" stroke="#00D084" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  <path d="M556,220 L520,200" stroke="#2563FF" stroke-width="2" stroke-dasharray="6,4" fill="none" opacity="0.5"/>

  <g opacity="0.9">
    <circle cx="220" cy="272" r="4" fill="#25D366"/>
    <circle cx="380" cy="200" r="4" fill="#00D084"/>
    <circle cx="500" cy="278" r="4" fill="#2563FF"/>
  </g>

  <text x="360" y="40" text-anchor="middle" fill="#5C6A82" font-size="12" font-family="Inter,system-ui,sans-serif">ONE CONNECTED WORKFLOW</text>
</svg>
